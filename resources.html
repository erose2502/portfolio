const { useState, useEffect, useRef } = React;

function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); io.disconnect(); }
    }, { threshold });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

/* ── RESOURCE CARD ── */
function ResourceCard({ title, desc, tag, color, content, filename, delay }) {
  const ref = useReveal(0.1);
  const [hovered, setHovered] = useState(false);
  const [downloaded, setDownloaded] = useState(false);

  function handleDownload() {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
    setDownloaded(true);
    setTimeout(() => setDownloaded(false), 2500);
  }

  return (
    <div ref={ref} className={`reveal reveal-delay-${delay}`} style={{
      background:'var(--bg-1)', border:`1px solid ${hovered ? 'var(--border-hi)' : 'var(--border)'}`,
      borderRadius:20, overflow:'hidden',
      transform: hovered ? 'translateY(-5px)' : 'none',
      boxShadow: hovered ? '0 24px 48px rgba(0,0,0,0.4)' : 'none',
      transition:'all 0.4s cubic-bezier(0.22,1,0.36,1)',
    }}
      onMouseEnter={()=>setHovered(true)}
      onMouseLeave={()=>setHovered(false)}
    >
      {/* Preview pane */}
      <div style={{background:'var(--bg-2)', padding:'24px', borderBottom:'1px solid var(--border)', minHeight:140, fontFamily:'monospace', fontSize:11, color:'var(--text-3)', lineHeight:1.8, overflow:'hidden', position:'relative'}}>
        <div style={{position:'absolute', inset:0, padding:'20px 24px', overflow:'hidden'}}>
          {content.split('\n').slice(0,12).map((line,i) => (
            <div key={i} style={{color: line.startsWith('#') ? color : line.startsWith('##') ? color+'bb' : 'var(--text-3)', fontWeight: line.startsWith('#') ? 600 : 400}}>{line || ' '}</div>
          ))}
        </div>
        <div style={{position:'absolute', bottom:0, left:0, right:0, height:60, background:`linear-gradient(transparent, var(--bg-2))`}} />
      </div>
      <div style={{padding:'24px 26px 28px'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12}}>
          <span style={{fontSize:10, fontWeight:700, letterSpacing:'0.1em', textTransform:'uppercase', color, background:color+'18', padding:'4px 12px', borderRadius:100}}>{tag}</span>
          <span style={{fontSize:11, color:'var(--text-3)'}}>.md</span>
        </div>
        <h3 style={{fontFamily:'var(--font-display)', fontSize:20, fontWeight:800, letterSpacing:'-0.5px', marginBottom:8}}>{title}</h3>
        <p style={{fontSize:13, color:'var(--text-2)', lineHeight:1.7, marginBottom:20}}>{desc}</p>
        <button onClick={handleDownload} style={{
          width:'100%', padding:'12px', borderRadius:100,
          background: downloaded ? 'var(--green)' : color,
          color:'#080b0f', fontWeight:700, fontSize:13,
          border:'none', cursor:'pointer', fontFamily:'var(--font-body)',
          transition:'all 0.25s cubic-bezier(0.22,1,0.36,1)',
          transform: hovered && !downloaded ? 'scale(1.02)' : 'scale(1)',
        }}>
          {downloaded ? '✓ Downloaded!' : `↓ Download ${filename}`}
        </button>
      </div>
    </div>
  );
}

      </div>
    </section>
  );
}

function App() {
