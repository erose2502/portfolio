<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><title>Everon — Elijah Rose</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="../images/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080b0f;--bg-1:#0d1117;--bg-2:#161b24;--border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.14);--text:#f0ede8;--text-2:rgba(240,237,232,0.5);--text-3:rgba(240,237,232,0.28);--accent:#a78bfa;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;}
    html{scroll-behavior:smooth}body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}.reveal.visible{opacity:1;transform:none}
    @keyframes glow-pulse{0%,100%{opacity:.2}50%{opacity:.45}}.glow-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:glow-pulse 4s ease-in-out infinite}
    @media(max-width:768px){.d-hero{padding:100px 20px 60px !important}.d-grid{grid-template-columns:1fr !important;gap:16px !important}.px-s{padding-left:20px !important;padding-right:20px !important}}
  </style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
function useReveal(t=0.12){const ref=useRef(null);useEffect(()=>{const el=ref.current;if(!el)return;const io=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('visible');io.disconnect();}},{threshold:t});io.observe(el);return()=>io.disconnect();},[]);return ref;}
function Nav(){const[s,setS]=useState(false);useEffect(()=>{const h=()=>setS(window.scrollY>40);window.addEventListener('scroll',h);return()=>window.removeEventListener('scroll',h);},[]);return(<nav style={{position:'fixed',top:0,left:0,right:0,zIndex:999,padding:'0 28px',height:64,background:s?'rgba(8,11,15,0.95)':'transparent',backdropFilter:s?'blur(20px)':'none',borderBottom:s?'1px solid var(--border)':'1px solid transparent',transition:'all .4s',display:'flex',alignItems:'center',justifyContent:'space-between'}}><a href="../index.html" style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:17,color:'var(--text)',textDecoration:'none'}}>Elijah Rose<span style={{color:'#e8c547'}}>.</span></a><a href="../index.html#work" style={{fontSize:13,color:'var(--text-2)',textDecoration:'none',fontWeight:500,padding:'8px 16px',border:'1px solid var(--border)',borderRadius:100}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--border-hi)';e.currentTarget.style.color='var(--text)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--text-2)'}}>← All projects</a></nav>);}

function App(){
  const[v,setV]=useState(false);useEffect(()=>{setTimeout(()=>setV(true),80);},[]);
  const sp=d=>({opacity:v?1:0,transform:v?'none':'translateY(28px)',transition:`opacity .8s cubic-bezier(.22,1,.36,1) ${d}s,transform .8s cubic-bezier(.22,1,.36,1) ${d}s`});
  const A='#a78bfa',AD='rgba(167,139,250,0.1)';
  const features=[
    {title:'AI Resume Analysis',desc:'Upload a PDF resume and receive instant AI-powered feedback: professional summary, career level assessment, strengths, improvement areas, actionable recommendations, and ATS keyword optimization.'},
    {title:'AI Career Coaching',desc:'Interactive chat with an AI assistant for personalized career advice, interview preparation, job search strategies, and career development planning.'},
    {title:'Real-time voice coaching',desc:'Natural voice conversations with the AI career coach via LiveKit-powered audio streaming. Hands-free career coaching with real-time STT/TTS.'},
    {title:'Job search integration',desc:'Search and discover job opportunities from LinkedIn and Indeed with AI-powered job matching based on your resume profile.'},
    {title:'Authentication & persistence',desc:'Firebase auth with email/password and Google OAuth. Firestore persistence for conversation history, resume uploads, and coaching session continuity across devices.'},
    {title:'Rebuilt from prototype',desc:'Everon was fully rebuilt from a stateless prototype to production architecture — demonstrating the ability to refactor and harden AI systems, not just greenfield build.'},
  ];
  const ref1=useReveal();
  return(<>
    <Nav/>
    <section className="d-hero" style={{padding:'120px 32px 72px',maxWidth:1100,margin:'0 auto',position:'relative'}}>
      <div className="glow-orb" style={{width:450,height:450,background:`radial-gradient(circle,${A}18,transparent)`,top:'-60px',right:'-40px'}}/>
      <div style={sp(0.1)}><span style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:A,background:AD,padding:'5px 13px',borderRadius:100,border:`1px solid ${A}44`}}>Live · AI Career Assistant</span></div>
      <h1 style={{...sp(0.2),fontFamily:'var(--font-display)',fontSize:'clamp(44px,7vw,84px)',fontWeight:700,letterSpacing:'-3px',lineHeight:.92,margin:'22px 0 18px'}}>Everon<span style={{color:A}}>.</span></h1>
      <p style={{...sp(0.25),fontFamily:'var(--font-display)',fontSize:'clamp(17px,2.5vw,26px)',fontWeight:600,color:'var(--text-2)',letterSpacing:'-0.5px',marginBottom:20}}>AI-powered career assistant — rebuilt from prototype to production.</p>
      <p style={{...sp(0.3),fontSize:'clamp(14px,1.8vw,17px)',color:'var(--text-2)',maxWidth:580,lineHeight:1.75,marginBottom:36}}>Everon is an intelligent AI career assistant that helps job seekers optimize resumes, prepare for interviews, and discover relevant opportunities. Built with OpenAI GPT-4, LiveKit voice integration, and Firebase authentication. Firebase auth, Firestore persistence. Rebuilt from prototype to production architecture.</p>
      <div style={{...sp(0.4),display:'flex',gap:10,flexWrap:'wrap',marginBottom:36}}>
        {['React 18','TypeScript','OpenAI GPT-4','LiveKit','Firebase Auth','Firestore','Vite'].map(s=><span key={s} style={{fontSize:11,fontWeight:600,padding:'5px 13px',borderRadius:100,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.12)',color:'var(--text-2)'}}>{s}</span>)}
      </div>
    </section>

    <section className="px-s" style={{padding:'0 32px 56px',maxWidth:1100,margin:'0 auto'}}>
      <div style={{background:'var(--bg-1)',border:`1px solid ${A}33`,borderLeft:`3px solid ${A}`,borderRadius:14,padding:'26px 30px'}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:A,marginBottom:10}}>Mindset applied</div>
        <p style={{fontSize:14,color:'var(--text-2)',lineHeight:1.7,marginBottom:14}}>Career guidance should be practical, respectful, and measurable. Everon emphasizes actionable advice and user-owned progress.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:12}}>
          {[
            'Actionable feedback over generic advice',
            'Clear boundaries on recommendations',
            'Data ownership and privacy by default',
          ].map(item => (
            <div key={item} style={{display:'flex',gap:10,alignItems:'flex-start',fontSize:13,color:'var(--text-2)'}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:A,boxShadow:`0 0 6px ${A}`}}></span>
              <span>{item}</span>
            </div>
          ))}
        </div>
      </div>
    </section>

    <section className="px-s" style={{padding:'0 32px 72px',maxWidth:1100,margin:'0 auto'}}>
      <div style={{borderRadius:20,border:'1px solid var(--border-hi)',background:'var(--bg-1)',display:'flex',alignItems:'center',justifyContent:'center',minHeight:260,boxShadow:`0 0 60px ${A}15`}}>
        <img src="../images/Everon-icon.png" alt="Everon" style={{maxWidth:200,maxHeight:200,objectFit:'contain',padding:48,opacity:.85}}/>
      </div>
    </section>

    <section className="px-s" style={{padding:'0 32px 80px',maxWidth:1100,margin:'0 auto'}}>
      <div ref={ref1} className="reveal" style={{marginBottom:32}}>
        <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:A,marginBottom:10}}>Features</div>
        <h2 style={{fontFamily:'var(--font-display)',fontSize:'clamp(26px,4vw,40px)',fontWeight:700,letterSpacing:'-1.5px'}}>Comprehensive career AI,<br/>from resume to offer.</h2>
      </div>
      <div className="d-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {features.map((f,i)=>{const r=useReveal();return(<div key={f.title} ref={r} className="reveal" style={{padding:'24px 26px',background:'var(--bg-1)',border:'1px solid var(--border)',borderRadius:14,borderTop:`2px solid ${A}44`,transitionDelay:`${i*0.06}s`}}><h3 style={{fontFamily:'var(--font-display)',fontSize:15,fontWeight:700,marginBottom:8,color:A}}>{f.title}</h3><p style={{fontSize:13,color:'var(--text-2)',lineHeight:1.75}}>{f.desc}</p></div>);})}
      </div>
    </section>

    <section style={{padding:'60px 32px',background:'var(--bg-1)',borderTop:'1px solid var(--border)',textAlign:'center'}}>
      <div style={{marginBottom:14,fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--text-3)'}}>Next project</div>
      <a href="kazi.html" style={{fontFamily:'var(--font-display)',fontSize:'clamp(28px,4vw,48px)',fontWeight:700,color:'var(--text)',textDecoration:'none',display:'inline-flex',alignItems:'center',gap:14,transition:'gap .2s'}} onMouseEnter={e=>e.currentTarget.style.gap='22px'} onMouseLeave={e=>e.currentTarget.style.gap='14px'}>Kazi Orchestrate <span style={{color:'#7c3aed'}}>→</span></a>
    </section>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
