/* ─── SPRING REVEAL HOOK ─── */
function useReveal(threshold = 0.15) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); io.disconnect(); }
    }, { threshold });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return ref;
}

    {name:'React', color:'var(--cyan)', bg:'var(--cyan-dim)', dot:'#22d3ee'},

/* ─── CONTACT FORM ─── */
function ContactForm() {
  const [status, setStatus] = useState('idle'); // idle | sending | success | error
  const [form, setForm] = useState({firstName:'', lastName:'', email:'', message:''});
  const inputStyle = (focused) => ({
    width:'100%', background:'var(--bg)', border:`1px solid ${focused ? 'var(--accent)' : 'var(--border)'}`,
    borderRadius:10, padding:'12px 14px', color:'var(--text)', fontSize:14,
    outline:'none', fontFamily:'var(--font-body)', transition:'border-color 0.2s',
  });
  const [focused, setFocused] = useState({});

  async function handleSubmit(e) {
    e.preventDefault();
    setStatus('sending');
    try {
      const res = await fetch('https://formspree.io/f/xqaqodgw', {
        method:'POST',
        headers:{'Content-Type':'application/json', 'Accept':'application/json'},
        body: JSON.stringify({
          name: form.firstName + ' ' + form.lastName,
          email: form.email,
          message: form.message,
        }),
      });
      if (res.ok) { setStatus('success'); setForm({firstName:'',lastName:'',email:'',message:''}); }
      else { setStatus('error'); }
    } catch { setStatus('error'); }
  }

  if (status === 'success') return (
    <div style={{background:'var(--bg-2)',border:'1px solid var(--border-hi)',borderRadius:24,padding:'60px 40px',textAlign:'center',boxShadow:'0 0 60px rgba(74,222,128,0.08)'}}>
      <div style={{fontSize:40,marginBottom:16}}>✓</div>
      <h3 style={{fontFamily:'var(--font-display)',fontSize:24,fontWeight:700,marginBottom:10,color:'var(--green)'}}>Message sent!</h3>
      <p style={{color:'var(--text-2)',fontSize:15}}>I'll get back to you within 24 hours.</p>
      <button onClick={()=>setStatus('idle')} style={{marginTop:24,padding:'10px 24px',borderRadius:100,background:'transparent',border:'1px solid var(--border-hi)',color:'var(--text-2)',cursor:'pointer',fontSize:13,fontFamily:'var(--font-body)'}}>Send another</button>
    </div>
  );

  return (
    <form onSubmit={handleSubmit} style={{background:'var(--bg-2)',border:'1px solid var(--border-hi)',borderRadius:24,padding:'40px',boxShadow:'0 0 60px rgba(232,197,71,0.06)'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
        {[['firstName','First Name','John'],['lastName','Last Name','Doe']].map(([key,label,ph])=>(
          <div key={key}>
            <label style={{fontSize:12,color:'var(--text-2)',fontWeight:500,display:'block',marginBottom:8}}>{label}</label>
            <input required value={form[key]} onChange={e=>setForm(f=>({...f,[key]:e.target.value}))}
              placeholder={ph} style={inputStyle(focused[key])}
              onFocus={()=>setFocused(f=>({...f,[key]:true}))}
              onBlur={()=>setFocused(f=>({...f,[key]:false}))}
            />
          </div>
        ))}
      </div>
      <div style={{marginBottom:16}}>
        <label style={{fontSize:12,color:'var(--text-2)',fontWeight:500,display:'block',marginBottom:8}}>Email</label>
        <input required type="email" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}
          placeholder="hello@example.com" style={inputStyle(focused.email)}
          onFocus={()=>setFocused(f=>({...f,email:true}))}
          onBlur={()=>setFocused(f=>({...f,email:false}))}
        />
      </div>
      <div style={{marginBottom:24}}>
        <label style={{fontSize:12,color:'var(--text-2)',fontWeight:500,display:'block',marginBottom:8}}>Message</label>
        <textarea required rows={5} value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))}
          placeholder="Tell me about your project..." style={{...inputStyle(focused.message),resize:'vertical'}}
          onFocus={()=>setFocused(f=>({...f,message:true}))}
          onBlur={()=>setFocused(f=>({...f,message:false}))}
        />
      </div>
      <button type="submit" disabled={status==='sending'} style={{
        width:'100%',padding:'16px',borderRadius:100,
        background: status==='sending' ? 'rgba(232,197,71,0.5)' : 'var(--accent)',
        color:'#080b0f',fontWeight:700,fontSize:15,border:'none',
        cursor: status==='sending' ? 'not-allowed' : 'pointer',
        transition:'opacity 0.2s',fontFamily:'var(--font-body)',
      }}>
        {status==='sending' ? 'Sending...' : 'Send message →'}
      </button>
      {status==='error' && <p style={{color:'#f87171',fontSize:13,marginTop:12,textAlign:'center'}}>Something went wrong. Email me directly at elijah@kazi-orchestrate.com</p>}
    </form>
  );
}

/* ─── VOICE WIDGET ─── */
function VoiceWidget() {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesRef = useRef(null);
  const BACKEND = 'https://my-web-agent.vercel.app';

  useEffect(() => {
    if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
  }, [messages]);

  async function send(text) {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput('');
    setMessages(prev => [...prev, {role:'user', text:msg}]);
    setLoading(true);
    try {
      const res = await fetch(BACKEND + '/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({message:msg, conversationHistory: messages.map(m=>({role:m.role,content:m.text}))})
      });
      const data = await res.json();
      const reply = data.text || data.response || 'Let me know how I can help!';
      setMessages(prev => [...prev, {role:'assistant', text:reply}]);
    } catch {
      setMessages(prev => [...prev, {role:'assistant', text:"Sorry, I couldn't connect right now. Reach me at elijah@kazi-orchestrate.com!"}]);
    }
    setLoading(false);
  }

  const suggestions = ['What services do you offer?','Tell me about Everon','How do I book a call?','What are your prices?'];

  return (
    <>
      {/* Chat panel */}
      <div style={{
        position:'fixed', bottom:88, right:24, width:360, zIndex:9998,
        background:'var(--bg-1)', border:'1px solid var(--border-hi)',
        borderRadius:20, overflow:'hidden',
        boxShadow:'0 24px 60px rgba(0,0,0,0.6)',
        opacity: open ? 1 : 0,
        transform: open ? 'translateY(0) scale(1)' : 'translateY(16px) scale(0.96)',
        pointerEvents: open ? 'all' : 'none',
        transition:'all 0.35s cubic-bezier(0.22,1,0.36,1)',
        transformOrigin:'bottom right',
        display:'flex', flexDirection:'column', maxHeight:520,
      }}>
        {/* Header */}
        <div style={{padding:'16px 18px', borderBottom:'1px solid var(--border)', display:'flex', gap:12, alignItems:'center', background:'var(--bg-2)'}}>
          <img src={window.__resources && window.__resources.myAvatarPng || "images/my_avatar.png"} alt="Elijah" style={{width:36, height:36, borderRadius:'50%', objectFit:'cover', border:'2px solid var(--accent)'}} />
          <div style={{flex:1}}>
            <div style={{fontWeight:600, fontSize:14}}>Elijah's AI Assistant</div>
            <div style={{fontSize:11, color:'var(--green)'}}>● Online</div>
          </div>
          <button onClick={()=>setOpen(false)} style={{background:'none', border:'none', color:'var(--text-2)', cursor:'pointer', fontSize:18, lineHeight:1}}>×</button>
        </div>
        {/* Messages */}
        <div ref={messagesRef} style={{flex:1, overflowY:'auto', padding:'16px', display:'flex', flexDirection:'column', gap:10}}>
          {messages.length === 0 && (
            <div>
              <p style={{fontSize:14, color:'var(--text-2)', lineHeight:1.7, marginBottom:16}}>Hey! 👋 I'm Elijah's AI assistant. Ask me anything about his work, services, or projects.</p>
              <div style={{display:'flex', flexDirection:'column', gap:8}}>
                {suggestions.map(s => (
                  <button key={s} onClick={()=>send(s)} style={{textAlign:'left', background:'var(--bg-2)', border:'1px solid var(--border)', borderRadius:10, padding:'9px 14px', color:'var(--text-2)', fontSize:13, cursor:'pointer', transition:'all 0.2s', fontFamily:'var(--font-body)'}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--accent)'; e.currentTarget.style.color='var(--text)';}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)'; e.currentTarget.style.color='var(--text-2)';}}
                  >{s}</button>
                ))}
              </div>
            </div>
          )}
          {messages.map((m,i) => (
            <div key={i} style={{display:'flex', justifyContent: m.role==='user' ? 'flex-end' : 'flex-start'}}>
              <div style={{
                maxWidth:'82%', padding:'10px 14px', borderRadius: m.role==='user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                background: m.role==='user' ? 'var(--accent)' : 'var(--bg-2)',
                color: m.role==='user' ? '#080b0f' : 'var(--text)',
                fontSize:13, lineHeight:1.6,
              }}>{m.text}</div>
            </div>
          ))}
          {loading && (
            <div style={{display:'flex', gap:4, padding:'10px 14px', background:'var(--bg-2)', borderRadius:'14px 14px 14px 4px', width:'fit-content'}}>
              {[0,1,2].map(d=><div key={d} style={{width:6,height:6,borderRadius:'50%',background:'var(--text-3)',animation:`bounce 1.2s ${d*0.15}s infinite`}}/>)}
            </div>
          )}
        </div>
        {/* Input */}
        <div style={{padding:'12px', borderTop:'1px solid var(--border)', display:'flex', gap:8}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter') send(); }}
            placeholder="Ask anything..."
            style={{flex:1, background:'var(--bg)', border:'1px solid var(--border)', borderRadius:10, padding:'10px 14px', color:'var(--text)', fontSize:13, outline:'none', fontFamily:'var(--font-body)'}}
          />
          <button onClick={()=>send()} style={{background:'var(--accent)', border:'none', borderRadius:10, padding:'0 16px', color:'#080b0f', fontWeight:700, cursor:'pointer', fontSize:16}}>→</button>
        </div>
      </div>
      {/* Toggle button */}
      <button onClick={()=>setOpen(o=>!o)} style={{
        position:'fixed', bottom:24, right:24, zIndex:9999,
        width:56, height:56, borderRadius:'50%',
        background: open ? 'var(--bg-2)' : 'var(--accent)',
        border: open ? '1px solid var(--border-hi)' : 'none',
        cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
        boxShadow: open ? 'none' : '0 8px 24px rgba(232,197,71,0.35)',
        transition:'all 0.3s cubic-bezier(0.22,1,0.36,1)',
        transform: open ? 'rotate(45deg)' : 'rotate(0deg)',
      }}>
        {open ? <span style={{fontSize:22, color:'var(--text)', transform:'rotate(0deg)'}}>×</span>
               : <img src="images/my_avatar.png" alt="Chat" style={{width:40, height:40, borderRadius:'50%', objectFit:'cover'}} />}
      </button>
      <style>{`@keyframes bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5}40%{transform:scale(1.2);opacity:1}}`}</style>
    </>
  );
}
