<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 — Elijah Rose</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/images/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080b0f;--text:#f0ede8;--text-2:rgba(240,237,232,0.4);--accent:#e8c547;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:32px;-webkit-font-smoothing:antialiased;}
    @keyframes glow{0%,100%{opacity:.15}50%{opacity:.35}}
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:glow 4s ease-in-out infinite;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    .content{animation:fadeUp .8s cubic-bezier(.22,1,.36,1) forwards;}
  </style>
</head>
<body>
  <div class="orb" style="width:400px;height:400px;background:radial-gradient(circle,rgba(232,197,71,0.15),transparent);top:-100px;left:-100px;"></div>
  <div class="orb" style="width:300px;height:300px;background:radial-gradient(circle,rgba(34,211,238,0.1),transparent);bottom:-80px;right:-80px;animation-delay:2s;"></div>
  <div class="content">
    <div style="font-family:var(--font-display);font-size:clamp(80px,15vw,160px);font-weight:700;letter-spacing:-4px;line-height:1;color:var(--accent);opacity:0.3;margin-bottom:8px;">404</div>
    <h1 style="font-family:var(--font-display);font-size:clamp(28px,5vw,48px);font-weight:700;letter-spacing:-1.5px;margin-bottom:12px;">Page not found.</h1>
    <p style="font-size:16px;color:var(--text-2);margin-bottom:40px;max-width:380px;line-height:1.7;">This page doesn't exist or was moved. Head back to the portfolio.</p>
    <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:100px;background:var(--accent);color:#080b0f;font-weight:700;font-size:15px;text-decoration:none;font-family:var(--font-body);transition:opacity .2s;" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">← Back to portfolio</a>
  </div>
</body>
</html>
